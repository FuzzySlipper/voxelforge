# VoxelForge Electron renderer — electron-builder packaging configuration
#
# Packaging workflow:
#   1. Run `npm run publish-sidecar` (or `cd .. && ./scripts/publish-sidecar.sh`)
#      to publish VoxelForge.Bridge as a self-contained .NET binary.
#   2. Run `npm run package:dir` or `npm run package` to build the Electron package
#      with the sidecar bundled as an extra resource.
#
# The combined workflow `npm run package:dir` handles both steps automatically.
# See README.md#electron-packaging-workflow for details.
#
# Sidecar bundling:
#   The C# sidecar (VoxelForge.Bridge) is published via `dotnet publish --self-contained`
#   and bundled as an extraResource at resources/sidecar/. Electron main process
#   discovers it at runtime via process.resourcesPath when the repository root
#   (voxelforge.slnx) is not found (i.e., running from a package directory).
#
# Dev mode (repo root):
#   When voxelforge.slnx is found by walking up from __dirname, the sidecar is
#   launched via `dotnet run --project src/VoxelForge.Bridge` as before.
#   This path is unchanged — dev and smoke workflows continue to work.
#
# Known limitations:
#   - Linux only: only the linux-x64 runtime is published. macOS and Windows
#     targets are not yet configured in electron-builder.yml.
#   - Self-contained size: the dotnet publish --self-contained sidecar is
#     approximately 60-120 MB due to the bundled .NET runtime. This is expected
#     for standalone .NET applications and could be reduced with trimming
#     (PublishTrimmed) in future work.
#   - File associations: .vforge file extension registration is deferred.

appId: com.voxelforge.electron-renderer
productName: VoxelForge Electron Renderer
copyright: Copyright © 2025 VoxelForge
directories:
  output: out
files:
  - dist/**/*
  - package.json

# Bundle the published sidecar binary into the Electron package.
# During dir/AppImage builds, electron-builder copies sidecar/ (from the
# electron/ directory) into the resources/ directory of the packaged app.
# The Electron main process uses process.resourcesPath/sidecar/VoxelForge.Bridge
# when running from a package directory.
extraResources:
  - from: sidecar/
    to: sidecar/
    filter:
      - "**/*"

linux:
  target:
    - dir
    - AppImage
  category: Graphics
  maintainer: voxelforge@example.com
  synopsis: VoxelForge Electron Renderer
  description: LLM-assisted voxel authoring tool — Electron renderer (experimental)
extraMetadata:
  main: dist/main/index.js
